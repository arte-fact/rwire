# CI: Rust workspace checks + the TypeScript runtime, including the artifact
# drift gate (RELEASE_ROADMAP.md R2 / RT2). Node is present in the rust job so
# the wire round-trip harness runs the vendored artifact instead of skipping.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: runtime/package-lock.json
      - run: npm ci
        working-directory: runtime
      - run: npm run check
        working-directory: runtime
      # build + unit tests (every opcode branch) + size budget
      - run: npm test
        working-directory: runtime
      # Drift gate: the checked-in artifact and the generated opcode table
      # must match a fresh build from source — a stale or hand-edited
      # libs/rwire/assets/runtime.min.js or runtime/src/opcodes.ts fails here.
      - run: node sync.mjs
        working-directory: runtime
      - run: git diff --exit-code -- libs/rwire/assets/runtime.min.js runtime/src/opcodes.ts
