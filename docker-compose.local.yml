services:
  rwire-website:
    build:
      context: .
      args:
        PACKAGE: rwire-website
    ports:
      - "9001:9001"
    env_file: .env.local
    environment:
      BIND_ADDR: "0.0.0.0:9001"

  rwire-docs:
    build:
      context: .
      args:
        PACKAGE: rwire-docs
    ports:
      - "9002:9002"
    env_file: .env.local
    environment:
      BIND_ADDR: "0.0.0.0:9002"
      WEBSITE_URL: http://localhost:9001
      DOCS_URL: http://localhost:9002
      DESIGN_SYSTEM_URL: http://localhost:9003
      EXAMPLES_URL: http://localhost:9004
      DOCS_DIR: /app/docs

  rwire-design-system:
    build:
      context: .
      args:
        PACKAGE: rwire-design-system
    ports:
      - "9003:9003"
    env_file: .env.local
    environment:
      BIND_ADDR: "0.0.0.0:9003"

  rwire-examples:
    build:
      context: .
      args:
        PACKAGE: rwire-examples
    ports:
      - "9004:9004"
    env_file: .env.local
    environment:
      BIND_ADDR: "0.0.0.0:9004"
