version: "1.0"

state:
  user:
    - id: Counter
      fields:
        - name: count
          type: number
          default: 42

routes:
  - path: /
    page: home

ui:
  pages:
    home:
      title: "Counter (Phase 1 - Static)"
      tag: div
      styles:
        - property: display
          value: flex
        - property: flex-direction
          value: column
        - property: align-items
          value: center
        - property: justify-content
          value: center
        - property: min-height
          value: "100vh"
        - property: font-family
          value: "system-ui, -apple-system, sans-serif"
        - property: background
          value: "#2E3440"
        - property: color
          value: "#ECEFF4"
      children:
        - type: node
          tag: h1
          styles:
            - property: font-weight
              value: "300"
            - property: color
              value: "#88C0D0"
            - property: margin-bottom
              value: "0.5rem"
          children:
            - type: text
              content: "Counter"

        - type: node
          tag: p
          styles:
            - property: color
              value: "#4C566A"
            - property: margin-bottom
              value: "2rem"
          children:
            - type: text
              content: "Phase 1 - Static Rendering (buttons not functional yet)"

        - type: node
          tag: div
          styles:
            - property: display
              value: flex
            - property: gap
              value: "1rem"
            - property: align-items
              value: center
          children:
            # Decrement button
            - type: node
              tag: button
              styles:
                - property: font-size
                  value: "1.5rem"
                - property: padding
                  value: "0.5rem 1.25rem"
                - property: background
                  value: "#3B4252"
                - property: color
                  value: "#ECEFF4"
                - property: border
                  value: "1px solid #4C566A"
                - property: border-radius
                  value: "6px"
                - property: cursor
                  value: pointer
              handlers:
                - event: click
                  id: decrement
                  actions:
                    - action: update_state
                      scope: user
                      state_id: Counter
                      mutations:
                        - op: decrement
                          field: count
              children:
                - type: text
                  content: "−"

            # Count display
            - type: node
              tag: span
              styles:
                - property: font-size
                  value: "3rem"
                - property: min-width
                  value: "100px"
                - property: text-align
                  value: center
                - property: font-weight
                  value: "300"
              children:
                - type: dynamic_text
                  expr:
                    type: state
                    scope: user
                    state_id: Counter
                    path: count

            # Increment button
            - type: node
              tag: button
              styles:
                - property: font-size
                  value: "1.5rem"
                - property: padding
                  value: "0.5rem 1.25rem"
                - property: background
                  value: "#5E81AC"
                - property: color
                  value: "#ECEFF4"
                - property: border
                  value: none
                - property: border-radius
                  value: "6px"
                - property: cursor
                  value: pointer
              handlers:
                - event: click
                  id: increment
                  actions:
                    - action: update_state
                      scope: user
                      state_id: Counter
                      mutations:
                        - op: increment
                          field: count
              children:
                - type: text
                  content: "+"

        # Format expression demo
        - type: node
          tag: p
          styles:
            - property: margin-top
              value: "2rem"
            - property: color
              value: "#4C566A"
          children:
            - type: dynamic_text
              expr:
                type: format
                template: "Current value: {0}"
                args:
                  - type: state
                    scope: user
                    state_id: Counter
                    path: count
